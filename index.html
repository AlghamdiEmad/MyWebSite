<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najd | نـجـد</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo+Play:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    font-family: "Cairo Play", sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
}

header {
    text-align: center;
    padding: 25px;
    font-size: 28px;
    font-weight: 700;
    border-bottom: 1px solid #222;
}

.container {
    max-width: 550px;
    margin: auto;
    padding: 20px;
}

.post {
    background: #111;
    border: 1px solid #222;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 18px;
}

.post-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.username {
    font-weight: bold;
}

.post-time {
    font-size: 12px;
    color: #888;
}

.post-content {
    font-size: 17px;
    margin-top: 8px;
}

.delete-btn {
    margin-top: 10px;
    background: red;
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
    color: #fff;
}

.fab {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1DB954;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    font-size: 30px;
}

.modal {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 100%;
    background: #000000cc;
    display: none;
    justify-content: flex-end;
}

.modal-box {
    width: 100%;
    max-width: 550px;
    background: #111;
    padding: 20px;
    border-radius: 20px 20px 0 0;
}

textarea {
    width: 100%;
    height: 120px;
    background: #000;
    border: 1px solid #333;
    border-radius: 10px;
    color: #fff;
    padding: 10px;
}

.send-btn {
    margin-top: 10px;
    width: 100%;
    padding: 12px;
    background: #1DB954;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>Najd | نـجـد</header>

<div class="container">
    <div id="feed"></div>
</div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal" id="modal">
    <div class="modal-box">
        <textarea id="postInput" placeholder="اكتب..."></textarea>
        <button class="send-btn" onclick="sendPost()">نشر</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://yiwgqohertsftgnpcqoh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Q2n4xAgOpIbcXjiuzTToJg_vtpAkBHX';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* 🔥 user setup مرة وحدة */
let username = localStorage.getItem("username");
let userColor = localStorage.getItem("userColor");

if (!username) {
    username = prompt("اكتب اسم المستخدم:");
    localStorage.setItem("username", username);

    const colors = ["#ff4d4d","#4da6ff","#4dff88","#ffd24d","#b84dff"];
    userColor = colors[Math.floor(Math.random()*colors.length)];
    localStorage.setItem("userColor", userColor);
}

/* بوستاتي */
let myPosts = JSON.parse(localStorage.getItem("myPosts") || "[]");

function openModal() {
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

/* وقت */
function timeAgo(date) {
    const seconds = Math.floor((Date.now() - new Date(date)) / 1000);
    const intervals = { ساعة:3600, دقيقة:60 };

    for (let key in intervals) {
        const value = Math.floor(seconds / intervals[key]);
        if (value >= 1) return `قبل ${value} ${key}`;
    }
    return "الآن";
}

/* جلب */
async function getPosts() {
    const { data } = await _supabase.from('posts').select('*').order('created_at');

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    data.forEach(post => {
        const el = document.createElement("div");
        el.className = "post";

        el.innerHTML = `
            <div class="post-header">
                <div class="avatar" style="background:${post.color}"></div>
                <div>
                    <div class="username">${post.author}</div>
                    <div class="post-time">${timeAgo(post.created_at)}</div>
                </div>
            </div>

            <div class="post-content">${post.content}</div>

            ${myPosts.includes(post.id) ? `<button class="delete-btn" onclick="deletePost('${post.id}')">حذف</button>` : ""}
        `;

        feed.appendChild(el);
    });
}

/* نشر */
async function sendPost() {
    const content = document.getElementById("postInput").value;
    if (!content.trim()) return;

    const { data } = await _supabase
        .from('posts')
        .insert([{ content, author: username, color: userColor }])
        .select();

    myPosts.push(data[0].id);
    localStorage.setItem("myPosts", JSON.stringify(myPosts));

    document.getElementById("postInput").value = "";
    closeModal();
    getPosts();
}

/* حذف */
async function deletePost(id) {
    await _supabase.from('posts').delete().eq('id', id);

    myPosts = myPosts.filter(p => p !== id);
    localStorage.setItem("myPosts", JSON.stringify(myPosts));

    getPosts();
}

getPosts();
</script>

</body>
</html>
