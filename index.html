<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najd | نـجـد</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo+Play:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    font-family: "Cairo Play", sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
}

header {
    text-align: center;
    padding: 25px 0;
    font-size: 28px;
    font-weight: 700;
    border-bottom: 1px solid #222;
}

.container {
    max-width: 550px;
    margin: auto;
    padding: 20px;
}

.post {
    background: #111;
    border: 1px solid #222;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 18px;
    animation: fadeIn 0.3s ease;
}

.post-time {
    font-size: 13px;
    color: #888;
    margin-bottom: 10px;
}

.post-content {
    font-size: 18px;
    line-height: 1.7;
    white-space: pre-wrap;
}

.delete-btn {
    margin-top: 10px;
    background: #ff4444;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.fab {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1DB954;
    color: #000;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    font-size: 34px;
    border: none;
}

.modal {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000000cc;
    display: none;
    justify-content: flex-end;
    align-items: flex-end;
}

.modal-box {
    width: 100%;
    max-width: 550px;
    margin: auto;
    background: #111;
    padding: 20px;
    border-radius: 20px 20px 0 0;
    border: 1px solid #222;
    animation: slideUp 0.3s ease;
}

textarea {
    width: 100%;
    height: 120px;
    background: #000;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 12px;
    color: #fff;
    font-size: 17px;
    resize: none;
}

.send-btn {
    margin-top: 12px;
    width: 100%;
    padding: 14px;
    background: #1DB954;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

@keyframes slideUp {
    from {transform:translateY(100%);}
    to {transform:translateY(0);}
}
</style>
</head>

<body>

<header>Najd | نـجـد</header>

<div class="container">
    <div id="feed"></div>
</div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal" id="modal">
    <div class="modal-box">
        <textarea id="postInput" placeholder="اكتب الي بخاطرك..."></textarea>
        <button class="send-btn" onclick="sendPost()">نشر</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://yiwgqohertsftgnpcqoh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Q2n4xAgOpIbcXjiuzTToJg_vtpAkBHX';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* 📌 نخزن بوستات المستخدم */
let myPosts = JSON.parse(localStorage.getItem("myPosts") || "[]");

function openModal() {
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

document.getElementById("modal").addEventListener("click", e => {
    if (e.target === e.currentTarget) closeModal();
});

/* Enter ينشر */
document.getElementById("postInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendPost();
    }
});

/* الوقت */
function timeAgo(date) {
    const seconds = Math.floor((Date.now() - new Date(date)) / 1000);

    const intervals = {
        سنة: 31536000,
        شهر: 2592000,
        يوم: 86400,
        ساعة: 3600,
        دقيقة: 60
    };

    for (let key in intervals) {
        const value = Math.floor(seconds / intervals[key]);
        if (value >= 1) return `قبل ${value} ${key}`;
    }
    return "الآن";
}

/* جلب البوستات */
async function getPosts() {
    const { data } = await _supabase
        .from('posts')
        .select('*')
        .order('created_at', { ascending: true });

    const now = Date.now();
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    data.forEach(async post => {
        const postTime = new Date(post.created_at).getTime();
        const hoursPassed = (now - postTime) / (1000 * 60 * 60);

        if (hoursPassed >= 24) {
            await _supabase.from('posts').delete().eq('id', post.id);
            return;
        }

        const el = document.createElement("div");
        el.className = "post";

        el.innerHTML = `
            <div class="post-time">${timeAgo(post.created_at)}</div>
            <div class="post-content">${post.content}</div>
            ${myPosts.includes(post.id) ? `<button class="delete-btn" onclick="deletePost('${post.id}')">🗑 حذف</button>` : ""}
        `;

        feed.appendChild(el);
    });
}

/* نشر */
async function sendPost() {
    const content = document.getElementById("postInput").value;

    if (!content.trim()) return alert("اكتب شي أول!");

    const { data } = await _supabase
        .from('posts')
        .insert([{ content }])
        .select();

    /* نحفظ ID */
    myPosts.push(data[0].id);
    localStorage.setItem("myPosts", JSON.stringify(myPosts));

    document.getElementById("postInput").value = "";
    closeModal();
    getPosts();
}

/* حذف */
async function deletePost(id) {
    if (!confirm("متأكد؟")) return;

    await _supabase.from('posts').delete().eq('id', id);

    myPosts = myPosts.filter(p => p !== id);
    localStorage.setItem("myPosts", JSON.stringify(myPosts));

    getPosts();
}

getPosts();
</script>

</body>
</html>
