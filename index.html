<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najd | نـجـد</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        width: 90%;
        max-width: 400px;
        background: #111;
        padding: 25px;
        border-radius: 15px;
        border: 1px solid #222;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 10px;
        border: none;
        background: #1a1a1a;
        color: #fff;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 14px;
        background: #fff;
        color: #000;
        border: none;
        border-radius: 10px;
        font-size: 17px;
        font-weight: bold;
        margin-top: 20px;
        cursor: pointer;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }
</style>
</head>

<body>

<div class="box">
    <h2>Najd | نـجـد</h2>

    <label>اسم المستخدم:</label>
    <input id="username" type="text" placeholder="اكتب اسمك">

    <label style="margin-top:15px;">اختر لون الصورة الشخصية:</label>
    <input id="usercolor" type="color" value="#ff6b00">

    <button onclick="saveData()">Save</button>
</div>

<script>
function saveData() {
    const name = document.getElementById("username").value.trim();
    const color = document.getElementById("usercolor").value;

    if (!name) {
        alert("الرجاء كتابة اسم المستخدم");
        return;
    }

    localStorage.setItem("najd_name", name);
    localStorage.setItem("najd_color", color);

    window.location.href = "timeline.html";
}
</script>

</body>
</html>
