<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najd | نـجـد</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: system-ui, sans-serif;
    }

    .header {
        text-align: center;
        padding: 20px;
        font-size: 22px;
        font-weight: bold;
        border-bottom: 1px solid #222;
    }

    .container {
        max-width: 600px;
        margin: auto;
        padding: 15px;
    }

    .post {
        background: #111;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
        border: 1px solid #222;
        display: flex;
        gap: 12px;
        align-items: flex-start;
    }

    .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .post-content {
        flex: 1;
    }

    .author {
        font-weight: bold;
        margin-bottom: 5px;
    }

    .time {
        opacity: 0.5;
        font-size: 13px;
        margin-top: 5px;
    }

    .add-btn {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 55px;
        height: 55px;
        background: #fff;
        color: #000;
        border-radius: 50%;
        font-size: 35px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        font-weight: bold;
        z-index: 9999;
    }

    .modal {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #111;
        padding: 20px;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
        border: 1px solid #222;
        display: none;
        z-index: 99999;
    }

    textarea {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: #1a1a1a;
        color: #fff;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 14px;
        background: #fff;
        color: #000;
        border: none;
        border-radius: 10px;
        font-size: 17px;
        font-weight: bold;
        margin-top: 10px;
        cursor: pointer;
    }
</style>
</head>

<body>

<div class="header">Najd | نـجـد</div>

<div class="container" id="posts"></div>

<div class="add-btn" onclick="openModal()">+</div>

<div class="modal" id="modal">
    <textarea id="contentInput" rows="3" placeholder="اكتب منشورك..."></textarea>
    <button onclick="addPost()">نشر</button>
    <button style="background:#333;color:#fff;margin-top:10px;" onclick="closeModal()">إغلاق</button>
</div>

<script>
const supabase = supabase.createClient(
    "https://yiwgqohertsftgnpcqoh.supabase.co",
    "sb_publishable_Q2n4xAgOpIbcXjiuzTToJg_vtpAkBHX"
);

function openModal() {
    document.getElementById("modal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

async function addPost() {
    const content = document.getElementById("contentInput").value.trim();
    const author = localStorage.getItem("najd_name");
    const color = localStorage.getItem("najd_color");

    if (!content) {
        alert("اكتب محتوى المنشور");
        return;
    }

    await supabase.from("posts").insert([
        { author, color, content }
    ]);

    document.getElementById("contentInput").value = "";
    closeModal();
}

async function loadPosts() {
    const { data } = await supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending: true });

    displayPosts(data);
}

function displayPosts(posts) {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    const now = Date.now();

    posts.forEach(post => {
        const postTime = new Date(post.created_at).getTime();
        const diff = now - postTime;

        if (diff > 24 * 60 * 60 * 1000) {
            supabase.from("posts").delete().eq("id", post.id);
            return;
        }

        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <div class="avatar" style="background:${post.color}"></div>
            <div class="post-content">
                <div class="author">${post.author}</div>
                <div>${post.content}</div>
                <div class="time">${new Date(post.created_at).toLocaleString()}</div>
            </div>
        `;

        container.appendChild(div);
    });
}

supabase.channel("realtime:posts")
    .on("postgres_changes", { event: "*", schema: "public", table: "posts" }, loadPosts)
    .subscribe();

loadPosts();
</script>

</body>
</html>
